# BDD: features/devsecops-sprint1-quick-wins.feature:Funcionalidade: SDLC Scanning
# SDD: .openspec/changes/devsecops-sprint1-quick-wins/design.md#fase-2
# ATDD: .openspec/changes/devsecops-sprint1-quick-wins/tasks.md#task-2-3
# Sprint 1 — SDLC Scanning (Semgrep SAST + Gitleaks secret scan)
name: CI

# Triggers:
#   pull_request — runs on every PR (any base branch)
#   push to main — runs on every direct push to main (post-merge verification)
# Both Semgrep and Gitleaks run in parallel with `build`; the workflow-level
# `concurrency.cancel-in-progress: true` (below) drops redundant runs.
on:
  pull_request:
  push:
    branches: [main]

# cancel-in-progress on the workflow group covers all jobs (build, semgrep,
# gitleaks) — older PR runs are dropped when a new commit arrives, saving CI
# minutes when developers push follow-ups.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # [Sprint1-SDLC] SAST — runs Semgrep against src/ using the project-local
  # .semgrep.yml (created in Task 2.2). Fails the build on any F+ finding.
  # @v1 is the stable major; pin to a digest or move to @v2 once verified.
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep.yml

  # [Sprint1-SDLC] Secret scanning — uses the project-local .gitleaks.toml
  # (created in Task 2.2). fetch-depth: 0 ensures the full git history is
  # scanned, not just the latest commit (catches leaked secrets removed
  # from working tree but still in history).
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: api-padrao-test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # [FIX] Run #27592111496 travou 6h e foi cancelado porque AppModule
      # inicializa CacheModule (cache-manager-redis-yet), BullModule
      # e ThrottlerStorageRedisService — todos conectam em localhost:6379
      # no .env.test. Sem Redis no CI, os clientes entram em retry infinito
      # e o `npm run test:e2e` nunca termina. Mesma versão 7-alpine
      # usada em docker-compose.prod.yml.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Run Lint
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Unit Tests
        run: npm run test

      - name: Run E2E Test Migrations
        run: npm run test:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/api-padrao-test

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/api-padrao-test
