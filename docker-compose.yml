services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z
    networks:
      - local-network
    # [B3/Container-Hardening] PRECISA escrever em /var/lib/postgresql/data;
    # read_only quebraria. Mantemos no-new-privileges + cap_drop mínimo.
    read_only: false
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
      - FOWNER
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  api:
    build: 
      context: .
      target: runner
    container_name: api_container
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_DAYS: ${JWT_REFRESH_EXPIRES_DAYS}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-api-padrao}
      # [MED-001] libuv thread pool — 10 threads para bcrypt.hash/compare
      # sem bloquear o event loop. Antes: 4 (padrão Node). Veja Dockerfile.
      UV_THREADPOOL_SIZE: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    networks:
      - local-network
    # [B3/Container-Hardening] Sistema de arquivos raiz imutável.
    # Apenas volumes montados + tmpfs permitem escrita. CIS Docker 5.21.
    read_only: true
    # [B3/Container-Hardening] Impede escalação de privilégios via setuid binaries.
    # CIS Docker 5.25. Complementa USER appuser no Dockerfile.
    security_opt:
      - "no-new-privileges:true"
    # [B3/Container-Hardening] Remove todas as capabilities Linux. CIS Docker 5.3.
    cap_drop:
      - ALL
    # [B3/Container-Hardening] Capabilities mínimas para USER appuser.
    # CHOWN: trocar ownership; DAC_OVERRIDE: ignorar permissões para bind/read;
    # SETGID/SETUID: bind em portas <1024 se necessário + mudança de gid.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    # [B3/Container-Hardening] tmpfs para paths temporários (BullMQ, caches).
    # Necessário porque read_only=true bloqueia escrita em /tmp e demais paths.
    tmpfs:
      - /tmp:size=100M,mode=1777
      - /app/.cache:size=50M,mode=0755
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  otel-collector:
    image: docker.io/otel/opentelemetry-collector:0.111.0
    container_name: otel_collector_container
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:Z
    ports:
      - "43170:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "13133:13133" # Health Check extension
    networks:
      - local-network
    depends_on:
      jaeger:
        condition: service_healthy
    # [B3/Container-Hardening] OTel collector não precisa escrever no FS raiz;
    # somente /tmp para buffers. CIS Docker 5.21/5.25/5.3.
    read_only: true
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=50M,mode=1777
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  jaeger:
    image: docker.io/jaegertracing/all-in-one:1.62.0
    container_name: jaeger_container
    restart: always
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC receiver
    networks:
      - local-network
    # [B3/Container-Hardening] Jaeger all-in-one escreve em /tmp (badger); não
    # podemos aplicar read_only sem quebra. Mantemos no-new-privileges + cap_drop.
    read_only: false
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: redis_container
    restart: always
    ports:
      - "6379:6379"
    networks:
      - local-network
    volumes:
      - redis_data:/data
    # [B3/Container-Hardening] Redis persiste em /data (AOF/RDB); read_only
    # quebraria. Mantemos no-new-privileges + cap_drop mínimo.
    read_only: false
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  redis_data:

networks:
  local-network:
    driver: bridge